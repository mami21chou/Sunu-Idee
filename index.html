<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunu-Idées - Boîte à idées collaborative</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    
    <header class="bg-teal-900 text-white text-center py-12 mb-8">
        <h1 class="text-4xl font-bold mb-2"> Sunu-Idées</h1>
        <p class="text-lg">Partage tes idées anonymement</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        


        <section class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Liste des idées collaboratif</h2>
            <div id="idees" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center text-gray-500 py-12 bg-white rounded-lg shadow">
                    <p>Aucune idée pour le moment. Sois la première à proposer quelque chose !</p>
                </div>
            </div>
        </section>






        <section class=" max-w-2xl bg-white rounded-lg shadow-md p-6 mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6"> Proposer une idée</h2>
            
            <form id="ideeForm">
                <div class="mb-4">
                    <label for="titre" class="block text-gray-700 font-medium mb-2">Titre de l'idée</label>
                    <input type="text" id="titre" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                           placeholder="Ex: Créer un club de lecture">
                </div>
                <div class="mb-4">
                    <label for="categorie" class="block text-gray-700 font-medium mb-2">Catégorie</label>
                    <select id="categorie" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">Choisir une catégorie</option>
                        <option value="pedagogie"> Pédagogie</option>
                        <option value="evenement"> Événement</option>
                        <option value="vie-campus"> Vie de campus</option>
                        <option value="amelioration-technique"> Amélioration technique</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="description" class="block text-gray-700 font-medium mb-2">Description détaillée</label>
                    <textarea id="description" required 
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                              placeholder="Décris ton idée..." rows="4"></textarea>
                </div>
                <button type="submit" 
                        class=" bg-teal-900 text-white font-bold py-3 px-6 rounded-lg hover:opacity-90 transition duration-300">
                     Poster mon idée
                </button>
            </form>
        </section>

    </main>

    <footer class="text-center py-6 text-gray-600 border-t border-gray-200 mt-8">
        <p> Sunu-Idées - Boîte à idées collaborative - SAMBE Adji Aissatou Wade </p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
